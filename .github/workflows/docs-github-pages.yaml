name: Docs GitHub Pages

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy build artifact to GitHub Pages"
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - 'yt/docs/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-github-pages
  cancel-in-progress: false

jobs:
  build:
    if: github.repository == 'ytsaurus/ytsaurus'
    runs-on: ubuntu-latest
    env:
      SRC_ROOT: "./yt/docs"
      PAGES_ROOT: "./_docs-pages"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build docs for static hosting
        uses: diplodoc-platform/docs-build-action@v3
        with:
          revision: "${{ github.sha }}"
          src-root: "${{ env.SRC_ROOT }}"
          lint-root: "${{ env.PAGES_ROOT }}"

      - name: Smoke check generated docs
        run: |
          set -euo pipefail
          test -f "${{ env.PAGES_ROOT }}/en/index.html"
          test -f "${{ env.PAGES_ROOT }}/ru/index.html"
          test -d "${{ env.PAGES_ROOT }}/images"
          [[ "$(find "${{ env.PAGES_ROOT }}/en" -name "*.html" | wc -l)" -gt 0 ]]
          [[ "$(find "${{ env.PAGES_ROOT }}/ru" -name "*.html" | wc -l)" -gt 0 ]]
        shell: bash

      - name: Upload static artifact (fallback hosting)
        uses: actions/upload-artifact@v4
        with:
          name: docs-pages-static
          path: ${{ env.PAGES_ROOT }}
          retention-days: 14

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PAGES_ROOT }}

  deploy:
    if: github.repository == 'ytsaurus/ytsaurus' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy))
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
