          in: query
          required: true
          description: YSON shuffle handle from start_shuffle.
          schema:
            type: string
        - name: partition_index
          in: query
          required: true
          schema:
            type: integer
        - name: writer_index
          in: query
          schema:
            type: integer
      responses:
        '200':
          $ref: '#/components/responses/TabularSuccess'
        default:
          $ref: '#/components/responses/ErrorResponse'

