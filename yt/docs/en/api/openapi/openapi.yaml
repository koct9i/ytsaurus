          in: query
          required: true
          description: Query engine.
          schema:
            type: string
            enum: [ql, yql, chyt, spyt]
        - name: query
          in: query
          required: true
          description: Query string.
          schema:
            type: string
        - name: settings
          in: query
          description: YSON map of engine-specific settings.
          schema:
            type: string
        - name: draft
          in: query
          description: Save as draft without executing.
          schema:
            type: boolean
            default: false
        - name: annotations
          in: query
          description: YSON map of user annotations.
          schema:
            type: string
        - name: access_control_object
          in: query
          schema:
            type: string
        - name: access_control_objects
          in: query
          description: YSON list of access control objects.
          schema:
            type: string
      responses:
        '200':
          description: Query started
          content:
            application/json:
              schema:
