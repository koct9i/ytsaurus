  /link:
    post:
      tags: [cypress]
      operationId: linkNode
      summary: Create a symbolic link in Cypress
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - name: link_path
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/YPath'
        - name: target_path
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/YPath'
        - name: transaction_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: recursive
          in: query
          schema:
            type: boolean
            default: false
        - name: ignore_existing
          in: query
          schema:
            type: boolean
            default: false
        - name: lock_existing
          in: query
          schema:
            type: boolean
            default: false
        - name: force
          in: query
          schema:
            type: boolean
            default: false
        - name: attributes
          in: query
          schema:
            type: string
        - name: mutation_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: retry
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Link created
          content:
            application/json:
              schema:
                type: object
                properties:
                  value:
                    $ref: '#/components/schemas/GUID'
                    description: ID of the created link node
        default:
          $ref: '#/components/responses/ErrorResponse'

  /lock:
    post:
      tags: [cypress]
      operationId: lockNode
      summary: Acquire a lock on a Cypress node
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - name: path
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/YPath'
        - name: transaction_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: mode
          in: query
          description: Lock mode.
          schema:
            type: string
            enum: [snapshot, shared, exclusive]
            default: exclusive
        - name: waitable
          in: query
          description: If true, queue the lock instead of failing on conflict.
          schema:
            type: boolean
            default: false
        - name: child_key
          in: query
          description: Key for shared child lock.
          schema:
            type: string
        - name: attribute_key
          in: query
          description: Attribute key for shared attribute lock.
          schema:
            type: string
        - name: mutation_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: retry
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Lock acquired
          content:
            application/json:
              schema:
                type: object
                properties:
                  lock_id:
                    $ref: '#/components/schemas/GUID'
                  node_id:
                    $ref: '#/components/schemas/GUID'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /unlock:
    post:
      tags: [cypress]
      operationId: unlockNode
      summary: Release locks on a Cypress node
      description: |
        Releases all locks set by the given transaction on the node.
        Use sparingly; locks are automatically released at transaction end.
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - name: path
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/YPath'
        - name: transaction_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: mutation_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: retry
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          $ref: '#/components/responses/StructuredSuccess'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /concatenate:
    post:
      tags: [cypress]
      operationId: concatenate
      summary: Concatenate multiple Cypress nodes into one
      description: Concatenates multiple file or table nodes into a destination node.
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - name: source_paths
          in: query
          required: true
          description: YSON list of source paths.
          schema:
            type: string
        - name: destination_path
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/YPath'
        - name: transaction_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
      responses:
        '200':
          $ref: '#/components/responses/StructuredSuccess'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /externalize:
    post:
      tags: [cypress]
      operationId: externalize
