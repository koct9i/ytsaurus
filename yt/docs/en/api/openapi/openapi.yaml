openapi: 3.0.3
info:
  title: YTsaurus HTTP API
  description: |
    YTsaurus is a scalable and fault-tolerant open-source big data platform.
    This specification documents the YTsaurus HTTP API (proxy API).

    ## Overview

    The YTsaurus HTTP API is a command-based API where each operation is a command
    sent to a specific URL. All commands follow the pattern:

    ```
    POST /api/v4/{command_name}
    ```

    API version v4 is the current recommended version. Version v3 is available for
    backwards compatibility.

    ## Parameter Passing

    Command parameters can be provided in three ways (applied in order, later values override earlier):

    1. **Query string**: `?path=//tmp/test&recursive=true`
    2. **X-YT-Parameters header**: A YSON or JSON-encoded map of parameters
    3. **Request body** (for POST requests with structured input): A YSON or JSON-encoded map of parameters

    For heavy commands that stream data (binary files, tabular data), the body contains
    the data stream and parameters must be passed via query string or headers.

    ## Data Formats

    Commands work with the following data types:
    - **null**: No data
    - **structured**: YSON or JSON structured data (Cypress nodes, metadata)
    - **tabular**: Row-oriented tabular data (table contents)
    - **binary**: Raw binary data (file contents)

    Use `X-YT-Input-Format` and `X-YT-Output-Format` headers to specify formats.
    Common format values: `yson`, `json`, `dsv`, `yamr`, `schemaful_dsv`.

    ## Authentication

    Authentication is required for most commands (except `discover_proxies`).
    Supported methods:
    - **Token** (recommended): `Authorization: OAuth {token}` or `Authorization: Bearer {token}`
    - **Cookie**: Session cookie from web UI login
    - **TVM ticket**: For service-to-service authentication

    ## Error Handling

    On success, HTTP status 200 is returned. Errors return appropriate HTTP status codes
    with error details in the response body and `X-YT-Error` header.

  version: "4"
  contact:
    name: YTsaurus
    url: https://github.com/ytsaurus/ytsaurus
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: https://{cluster}/api/v4
    description: YTsaurus cluster HTTP proxy (API v4)
    variables:
      cluster:
        description: Cluster hostname (e.g., cluster.example.com)
        default: localhost:80
  - url: https://{cluster}/api/v3
    description: YTsaurus cluster HTTP proxy (API v3, legacy)
    variables:
      cluster:
        description: Cluster hostname (e.g., cluster.example.com)
        default: localhost:80

security:
  - OAuthToken: []
  - BearerToken: []

tags:
  - name: transactions
    description: Transaction management operations
  - name: cypress
    description: Cypress metadata tree operations
  - name: files
    description: File read/write operations
  - name: tables
    description: Static table read/write operations
  - name: dynamic_tables
    description: Dynamic (sorted and ordered) table operations
  - name: scheduler
    description: Map-reduce operations and scheduling
  - name: jobs
    description: Job inspection and management
  - name: query_tracker
    description: SQL-like query execution and management
  - name: queues
    description: Queue consumer and producer operations
  - name: pipeline
    description: YT Flow pipeline operations
  - name: authentication
    description: User authentication and token management
  - name: journals
    description: Journal read/write operations
  - name: chaos
    description: Chaos replication operations
  - name: shuffle
    description: Distributed shuffle operations
  - name: distributed_write
    description: Distributed write session operations
  - name: admin
    description: Administrative and maintenance operations
  - name: misc
    description: Miscellaneous utility operations

components:
  securitySchemes:
    OAuthToken:
      type: http
      scheme: bearer
      bearerFormat: OAuthToken
      description: |
        YTsaurus OAuth token. Use `Authorization: OAuth {token}` header.
        Note: The scheme value in header should be `OAuth`, but OpenAPI represents it as bearer here.
    BearerToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer token authentication. Use `Authorization: Bearer {token}` header.

  parameters:
    XYTParameters:
      name: X-YT-Parameters
      in: header
      description: |
        YSON or JSON map of command parameters. Format depends on X-YT-Header-Format.
        Example (YSON): `{path="//tmp/test";recursive=%true}`
        Example (JSON): `{"path":"//tmp/test","recursive":true}`
      schema:
        type: string
    XYTInputFormat:
      name: X-YT-Input-Format
      in: header
      description: |
        Format for input data stream. Common values:
        - `yson` (default for structured)
        - `json`
        - `dsv`
        - `yamr`
        - `schemaful_dsv`
      schema:
        type: string
        example: yson
    XYTOutputFormat:
      name: X-YT-Output-Format
      in: header
      description: |
        Format for output data stream. Common values:
        - `yson` (default)
        - `json`
        - `dsv`
        - `yamr`
        - `schemaful_dsv`
      schema:
        type: string
        example: json
    XYTHeaderFormat:
      name: X-YT-Header-Format
      in: header
      description: |
        Format used for X-YT-Parameters header parsing. Defaults to YSON.
        Values: `yson`, `json`
      schema:
        type: string
        example: json
    XYTErrorFormat:
      name: X-YT-Error-Format
      in: header
      description: |
        Format for error responses. Defaults to YSON.
        Values: `yson`, `json`
      schema:
        type: string
        example: json
    XYTSuppressRedirect:
      name: X-YT-Suppress-Redirect
      in: header
      description: Suppress redirect for heavy requests to data proxies
      schema:
        type: string
    AcceptEncoding:
      name: Accept-Encoding
      in: header
      description: Compression encoding for response. Supported values include `gzip`, `br`, `identity`.
      schema:
        type: string
    ContentEncoding:
      name: Content-Encoding
      in: header
      description: Compression encoding for request body. Supported values include `gzip`, `br`, `identity`.
      schema:
        type: string

  schemas:
    GUID:
      type: string
      pattern: '^[0-9a-f]+-[0-9a-f]+-[0-9a-f]+-[0-9a-f]+$'
      description: YTsaurus GUID (e.g., `1-2-3-4`)
      example: "0-54b-1-36223d20"
    YPath:
      type: string
      description: |
        YTsaurus Cypress path (YPath). Can be a simple path like `//tmp/test`
        or a rich YPath with attributes like `<append=%true>//tmp/test`.
      example: "//tmp/my_table"
    NullTransactionId:
      type: string
      description: Null transaction ID constant
      example: "0-0-0-0"
    YsonAny:
      description: |
        Any YSON value (map, list, scalar, or null).
        When content-type is application/json, use JSON format.
        When content-type is application/x-yson, use YSON format.
      oneOf:
        - type: object
        - type: array
        - type: string
        - type: number
        - type: boolean
        - type: "null"
    YsonMap:
      type: object
      description: A YSON/JSON map (dictionary)
      additionalProperties: true
    MutationOptions:
      type: object
      properties:
        mutation_id:
          allOf:
            - $ref: '#/components/schemas/GUID'
          description: |
            Mutation ID for idempotent retries. Generate once and reuse for retries.
        retry:
          type: boolean
          description: |
            Set to `true` for retry attempts after specifying `mutation_id`.
          default: false
    TransactionalOptions:
      type: object
      properties:
        transaction_id:
          allOf:
            - $ref: '#/components/schemas/GUID'
          description: Transaction ID. Omit or use null ID for top-level operations.
        ping_ancestor_transactions:
          type: boolean
          description: Whether to ping all parent transactions while executing the operation.
          default: false
    PrerequisiteOptions:
      type: object
      properties:
        prerequisite_revisions:
          type: array
          description: List of revision prerequisites (path + transaction_id + revision).
          items:
            $ref: '#/components/schemas/YsonMap'
        prerequisite_transactions:
          type: array
          description: List of transaction IDs that must exist for the operation to succeed.
          items:
            $ref: '#/components/schemas/GUID'
    MasterReadOptions:
      type: object
      properties:
        read_from:
          type: string
          description: |
            Data source for read operations. Use `cache` for non-master reads to reduce load.
          enum: [cache, leader, follower]
          default: leader
    TimeoutOptions:
      type: object
      properties:
        timeout:
          type: integer
          description: Operation timeout in milliseconds.
    ErrorResponse:
      type: object
      description: YTsaurus error response
      properties:
        code:
          type: integer
          description: Error code
        message:
          type: string
          description: Human-readable error message
        attributes:
          type: object
          additionalProperties: true
          description: Additional error attributes
        inner_errors:
          type: array
          description: Nested errors
          items:
            $ref: '#/components/schemas/ErrorResponse'
      required:
        - code
        - message

  responses:
    ErrorResponse:
      description: An error occurred
      headers:
        X-YT-Error:
          description: YTsaurus error in YSON format
          schema:
            type: string
        X-YT-Response-Code:
          description: YTsaurus error code
          schema:
            type: integer
        X-YT-Response-Message:
          description: YTsaurus error message
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
        application/x-yson:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    EmptySuccess:
      description: Command executed successfully, no output data
      headers:
        X-YT-Response-Parameters:
          description: Additional response parameters in YSON format
          schema:
            type: string
    StructuredSuccess:
      description: Command executed successfully, structured output
      headers:
        X-YT-Response-Parameters:
          description: Additional response parameters in YSON format
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/YsonAny'
        application/x-yson:
          schema:
            $ref: '#/components/schemas/YsonAny'
    TabularSuccess:
      description: Command executed successfully, tabular output stream
      headers:
        X-YT-Response-Parameters:
          description: Additional response parameters in YSON format
          schema:
            type: string
      content:
        application/json:
          schema:
            type: string
            description: Newline-delimited JSON rows
        application/x-yson:
          schema:
            type: string
            description: YSON stream of rows
        text/tab-separated-values:
          schema:
            type: string
            description: Tab-separated values
        text/plain:
          schema:
            type: string
            description: DSV or other text format
        application/octet-stream:
          schema:
            type: string
            format: binary
    BinarySuccess:
      description: Command executed successfully, binary output stream
      headers:
        X-YT-Response-Parameters:
          description: Additional response parameters in YSON format
          schema:
            type: string
      content:
        application/octet-stream:
          schema:
            type: string
            format: binary

paths:
  # ============================================================
  # TRANSACTIONS
  # ============================================================

  /start_transaction:
    post:
      tags: [transactions]
      operationId: startTransaction
      summary: Start a new transaction
      description: |
        Starts a new transaction. The new transaction is nested inside the current transaction
        if `transaction_id` is specified.
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - name: transaction_id
          in: query
          description: Parent transaction ID. New transaction will be nested inside it.
          schema:
            $ref: '#/components/schemas/GUID'
        - name: ping_ancestor_transactions
          in: query
          schema:
            type: boolean
            default: false
        - name: timeout
          in: query
          description: Transaction TTL since the last ping (milliseconds).
          schema:
            type: integer
            default: 15000
        - name: deadline
          in: query
          description: Transaction execution deadline (UTC timestamp).
          schema:
            type: string
        - name: attributes
          in: query
          description: Attributes to set on the created transaction (YSON map).
          schema:
            type: string
        - name: type
          in: query
          description: Transaction type.
          schema:
            type: string
            enum: [master, tablet]
            default: master
        - name: mutation_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: retry
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Transaction started successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  value:
                    $ref: '#/components/schemas/GUID'
                    description: ID of the created transaction
            application/x-yson:
              schema:
                $ref: '#/components/schemas/YsonAny'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /ping_transaction:
    post:
      tags: [transactions]
      operationId: pingTransaction
      summary: Ping (extend TTL of) a transaction
      description: |
        Pings a transaction on the server to extend its TTL. If `ping_ancestor_transactions`
        is true, also pings all parent transactions.
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - name: transaction_id
          in: query
          required: true
          description: Transaction ID to ping.
          schema:
            $ref: '#/components/schemas/GUID'
        - name: ping_ancestor_transactions
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          $ref: '#/components/responses/StructuredSuccess'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /commit_transaction:
    post:
      tags: [transactions]
      operationId: commitTransaction
      summary: Commit a transaction
      description: |
        Commits a transaction successfully. All nested transactions must be committed
        before the outer transaction can be committed.
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - name: transaction_id
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/GUID'
        - name: ping_ancestor_transactions
          in: query
          schema:
            type: boolean
            default: false
        - name: mutation_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: retry
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          $ref: '#/components/responses/StructuredSuccess'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /abort_transaction:
    post:
      tags: [transactions]
      operationId: abortTransaction
      summary: Abort a transaction
      description: |
        Aborts a transaction. All active nested transactions are also aborted.
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - name: transaction_id
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/GUID'
        - name: ping_ancestor_transactions
          in: query
          schema:
            type: boolean
            default: false
        - name: force
          in: query
          description: Force abort even if it may cause consistency loss (tablet transactions).
          schema:
            type: boolean
            default: false
        - name: mutation_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: retry
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          $ref: '#/components/responses/StructuredSuccess'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /generate_timestamp:
    post:
      tags: [transactions]
      operationId: generateTimestamp
      summary: Generate a monotonically increasing timestamp
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
      responses:
        '200':
          description: Timestamp generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  value:
                    type: integer
                    description: Generated timestamp value
        default:
          $ref: '#/components/responses/ErrorResponse'

  # ============================================================
  # CYPRESS (metadata tree)
  # ============================================================

  /create:
    post:
      tags: [cypress]
      operationId: createNode
      summary: Create a Cypress node
      description: |
        Creates a new node at the given path in the Cypress metadata tree.
        The node type determines what kind of object is created.
        Common types: map_node, list_node, string_node, int64_node, file, table, etc.
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - name: path
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/YPath'
        - name: type
          in: query
          required: true
          description: Node type (e.g., map_node, table, file, string_node).
          schema:
            type: string
            example: map_node
        - name: transaction_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: recursive
          in: query
          description: Create intermediate map nodes if they don't exist.
          schema:
            type: boolean
            default: false
        - name: ignore_existing
          in: query
          description: If node already exists, do not fail (ignore_existing is incompatible with force).
          schema:
            type: boolean
            default: false
        - name: lock_existing
          in: query
          description: Set exclusive lock on existing node (use with ignore_existing).
          schema:
            type: boolean
            default: false
        - name: force
          in: query
          description: If node already exists, replace it with a new one.
          schema:
            type: boolean
            default: false
        - name: attributes
          in: query
          description: YSON map of attributes to set on the created node.
          schema:
            type: string
        - name: mutation_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: retry
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Node created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  value:
                    $ref: '#/components/schemas/GUID'
                    description: ID of the created node
        default:
          $ref: '#/components/responses/ErrorResponse'

  /get:
    post:
      tags: [cypress]
      operationId: getNode
      summary: Get a Cypress node value
      description: Read the value of a node or attribute in the Cypress metadata tree.
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - name: path
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/YPath'
        - name: transaction_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: attributes
          in: query
          description: List of attributes to include with the response (YSON list).
          schema:
            type: string
        - name: max_size
          in: query
          description: Maximum number of children to return for list nodes.
          schema:
            type: integer
        - name: read_from
          in: query
          schema:
            type: string
            enum: [cache, leader, follower]
      responses:
        '200':
          $ref: '#/components/responses/StructuredSuccess'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /set:
    post:
      tags: [cypress]
      operationId: setNode
      summary: Set a Cypress node value
      description: |
        Sets the value of a node in the Cypress metadata tree.
        The new value is provided in the request body as YSON or JSON.
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTInputFormat'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - name: path
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/YPath'
        - name: transaction_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: recursive
          in: query
          description: Create intermediate nodes if they don't exist.
          schema:
            type: boolean
            default: false
        - name: force
          in: query
          description: Force set even if schema validation fails.
          schema:
            type: boolean
            default: false
        - name: mutation_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: retry
          in: query
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        description: The new value to set (YSON or JSON).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/YsonAny'
          application/x-yson:
            schema:
              $ref: '#/components/schemas/YsonAny'
      responses:
        '200':
          $ref: '#/components/responses/StructuredSuccess'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /multiset_attributes:
    post:
      tags: [cypress]
      operationId: multisetAttributes
      summary: Set multiple attributes on a Cypress node at once
      description: |
        Sets multiple attributes of a Cypress node atomically.
        The request body contains a YSON/JSON map where keys are attribute names
        and values are the corresponding attribute values.
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTInputFormat'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - name: path
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/YPath'
        - name: transaction_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: force
          in: query
          schema:
            type: boolean
            default: false
        - name: mutation_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: retry
          in: query
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        description: Map of attribute name to value.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/YsonMap'
          application/x-yson:
            schema:
              $ref: '#/components/schemas/YsonMap'
      responses:
        '200':
          $ref: '#/components/responses/StructuredSuccess'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /remove:
    post:
      tags: [cypress]
      operationId: removeNode
      summary: Remove a Cypress node
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - name: path
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/YPath'
        - name: transaction_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: recursive
          in: query
          description: Recursively remove all children.
          schema:
            type: boolean
            default: false
        - name: force
          in: query
          description: Do not fail if the path does not exist.
          schema:
            type: boolean
            default: false
        - name: mutation_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: retry
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          $ref: '#/components/responses/StructuredSuccess'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /list:
    post:
      tags: [cypress]
      operationId: listNode
      summary: List children of a Cypress node
      description: Returns a list of child keys for a map node.
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - name: path
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/YPath'
        - name: transaction_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
