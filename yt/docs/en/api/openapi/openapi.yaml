          schema:
            type: string
        - name: partition_count
          in: query
          required: true
          description: Number of shuffle partitions.
          schema:
            type: integer
        - name: parent_transaction_id
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/GUID'
        - name: replication_factor
          in: query
          schema:
            type: integer
        - name: medium
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Shuffle started
          content:
            application/json:
              schema:
                type: object
                properties:
                  shuffle_handle:
                    description: Handle for the shuffle session
                    $ref: '#/components/schemas/YsonMap'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /read_shuffle_data:
    post:
      tags: [shuffle]
      operationId: readShuffleData
