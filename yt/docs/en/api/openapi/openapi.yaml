          schema:
            type: integer
      responses:
        '200':
          $ref: '#/components/responses/EmptySuccess'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /internalize:
    post:
      tags: [cypress]
      operationId: internalize
      summary: Internalize a Cypress subtree from a portal cell
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - name: path
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/YPath'
      responses:
        '200':
          $ref: '#/components/responses/EmptySuccess'
        default:
          $ref: '#/components/responses/ErrorResponse'

  # ============================================================
  # FILES
  # ============================================================

  /write_file:
    post:
      tags: [files]
      operationId: writeFile
      summary: Write (upload) a file to Cypress
      description: |
        Uploads binary data to a file node in Cypress.
        The request body contains the raw binary file content.
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - $ref: '#/components/parameters/ContentEncoding'
        - name: path
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/YPath'
        - name: transaction_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: compute_md5
          in: query
          description: Whether to compute and set MD5 attribute.
          schema:
            type: boolean
            default: false
        - name: mutation_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: retry
          in: query
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        description: Raw binary file content.
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          $ref: '#/components/responses/StructuredSuccess'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /read_file:
    post:
      tags: [files]
      operationId: readFile
      summary: Read (download) a file from Cypress
      description: Downloads binary data from a file node in Cypress.
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - $ref: '#/components/parameters/AcceptEncoding'
        - name: path
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/YPath'
        - name: transaction_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: offset
          in: query
          description: Byte offset to start reading from.
          schema:
            type: integer
        - name: length
          in: query
          description: Number of bytes to read.
          schema:
            type: integer
      responses:
        '200':
          $ref: '#/components/responses/BinarySuccess'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /get_file_from_cache:
    post:
      tags: [files]
      operationId: getFileFromCache
      summary: Get file path from cache by MD5 hash
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - name: md5
          in: query
          required: true
          description: MD5 hash of the file.
          schema:
            type: string
        - name: cache_path
          in: query
          required: true
          description: Path to the file cache in Cypress.
          schema:
            $ref: '#/components/schemas/YPath'
        - name: transaction_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
      responses:
        '200':
          $ref: '#/components/responses/StructuredSuccess'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /put_file_to_cache:
    post:
      tags: [files]
      operationId: putFileToCache
      summary: Put a file into the cache
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - name: path
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/YPath'
        - name: cache_path
          in: query
          required: true
          description: Path to the file cache in Cypress.
          schema:
            $ref: '#/components/schemas/YPath'
        - name: transaction_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
      responses:
        '200':
          $ref: '#/components/responses/StructuredSuccess'
        default:
          $ref: '#/components/responses/ErrorResponse'

  # ============================================================
  # STATIC TABLES
  # ============================================================

  /write_table:
    post:
      tags: [tables]
      operationId: writeTable
      summary: Write rows to a static table
      description: |
        Writes tabular data to a static table. The request body contains the
        table rows in the specified input format (YSON, JSON, DSV, etc.).
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTInputFormat'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - $ref: '#/components/parameters/ContentEncoding'
        - name: path
          in: query
          required: true
          description: Table path. Use `<append=%true>//tmp/t` to append.
          schema:
            $ref: '#/components/schemas/YPath'
        - name: transaction_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: max_row_weight
          in: query
          description: Maximum weight of a single row in bytes.
          schema:
            type: integer
        - name: table_writer
          in: query
          description: YSON map of table writer options.
          schema:
            type: string
        - name: mutation_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: retry
          in: query
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        description: Table rows in the specified input format.
        content:
          application/json:
            schema:
              type: string
              description: Newline-delimited JSON rows
          application/x-yson:
            schema:
              type: string
              description: YSON stream of rows
          text/tab-separated-values:
            schema:
              type: string
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          $ref: '#/components/responses/StructuredSuccess'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /read_table:
    post:
      tags: [tables]
      operationId: readTable
      summary: Read rows from a static table
      description: |
        Reads rows from a static table. The response body contains the rows
        in the specified output format.
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - $ref: '#/components/parameters/AcceptEncoding'
        - name: path
          in: query
          required: true
          description: Table path. Can include row ranges (e.g., `//tmp/t[#0:#100]`).
          schema:
            $ref: '#/components/schemas/YPath'
        - name: transaction_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: unordered
          in: query
          description: Allow unordered reads for better performance.
          schema:
            type: boolean
            default: false
        - name: omit_inaccessible_columns
          in: query
          schema:
            type: boolean
            default: false
        - name: start_row_index_only
          in: query
          description: Return only the starting row index (for prefetch).
          schema:
            type: boolean
            default: false
        - name: table_reader
          in: query
          description: YSON map of table reader options.
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/TabularSuccess'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /read_blob_table:
    post:
      tags: [tables]
      operationId: readBlobTable
      summary: Read a file stored as a blob table
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - $ref: '#/components/parameters/AcceptEncoding'
        - name: path
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/YPath'
        - name: transaction_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: part_index_column_name
          in: query
          schema:
            type: string
            default: part_index
        - name: data_column_name
          in: query
          schema:
            type: string
            default: data
        - name: part_size
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          $ref: '#/components/responses/BinarySuccess'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /get_table_columnar_statistics:
    post:
      tags: [tables]
      operationId: getTableColumnarStatistics
      summary: Get per-column statistics for table chunks
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - name: paths
          in: query
          required: true
          description: YSON list of table paths.
          schema:
            type: string
        - name: transaction_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
        - name: fetcher_mode
          in: query
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/StructuredSuccess'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /partition_tables:
    post:
      tags: [tables]
      operationId: partitionTables
      summary: Partition tables for parallel processing
      description: Splits tables into balanced partitions for parallel reading.
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - name: paths
          in: query
          required: true
          description: YSON list of table paths.
          schema:
            type: string
        - name: partition_mode
          in: query
          schema:
            type: string
            enum: [sorted, unordered, ordered]
        - name: data_weight_per_partition
          in: query
          schema:
            type: integer
        - name: max_partition_count
          in: query
          schema:
            type: integer
        - name: enable_key_guarantee
          in: query
          schema:
            type: boolean
        - name: transaction_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
      responses:
        '200':
          $ref: '#/components/responses/StructuredSuccess'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /read_table_partition:
    post:
      tags: [tables]
      operationId: readTablePartition
      summary: Read a specific table partition
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - $ref: '#/components/parameters/AcceptEncoding'
        - name: cookie
          in: query
          required: true
          description: Partition cookie from partition_tables response.
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/TabularSuccess'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /locate_skynet_share:
    post:
      tags: [tables]
      operationId: locateSkynetShare
      summary: Locate chunks of a Skynet share
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - name: path
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/YPath'
        - name: transaction_id
          in: query
          schema:
            $ref: '#/components/schemas/GUID'
      responses:
        '200':
          $ref: '#/components/responses/StructuredSuccess'
        default:
          $ref: '#/components/responses/ErrorResponse'

  # ============================================================
  # DYNAMIC TABLES
  # ============================================================

  /select_rows:
    post:
      tags: [dynamic_tables]
      operationId: selectRows
      summary: Execute a SQL-like SELECT query on dynamic tables
      description: |
        Executes a YQL-like SELECT query against dynamic tables and returns results
        as tabular data.
      parameters:
        - $ref: '#/components/parameters/XYTParameters'
        - $ref: '#/components/parameters/XYTOutputFormat'
        - $ref: '#/components/parameters/XYTHeaderFormat'
        - $ref: '#/components/parameters/XYTErrorFormat'
        - $ref: '#/components/parameters/AcceptEncoding'
        - name: query
          in: query
          required: true
          description: SQL-like query string (e.g., `* from [//tmp/t] where key > 0`).
